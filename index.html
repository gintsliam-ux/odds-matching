<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odds Matching Dashboard</title>
<style>
  :root {
    --bg: #0a0e17; --card: #111827; --card2: #162033;
    --border: #2a3a5c; --border2: #1a2540;
    --text: #e0e0e0; --muted: #6b7fa3; --dim: #4a6080;
    --blue: #4a9eff; --green: #34d399; --red: #f87171;
    --yellow: #fbbf24; --purple: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

  /* Left Nav */
  .left-nav {
    width: 220px; flex-shrink: 0; background: linear-gradient(180deg, #0d1525 0%, #111827 100%);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    height: 100vh; position: sticky; top: 0;
  }
  .left-nav-brand {
    padding: 20px 18px 16px; border-bottom: 1px solid var(--border2);
    font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px;
  }
  .left-nav-brand b { color: var(--blue); }
  .left-nav-items { padding: 12px 10px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px;
    cursor: pointer; font-size: 14px; font-weight: 500; color: var(--muted);
    transition: all .2s; border: 1px solid transparent; user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .nav-item.active { background: rgba(74,158,255,0.1); border-color: rgba(74,158,255,0.25); color: #fff; }
  .nav-item .nav-icon { font-size: 18px; width: 24px; text-align: center; }
  .page-wrapper { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow-y: auto; height: 100vh; }
  .page-wrapper.hidden { display: none; }

  /* Header */
  header { background: linear-gradient(135deg, #0d1525 0%, #1a2540 100%); border-bottom: 2px solid var(--border); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 22px; font-weight: 700; color: #fff; white-space: nowrap; }
  header h1 b { color: var(--blue); }

  /* Sport Tabs */
  .sport-tabs-bar {
    background: #0b1322; border-bottom: 1px solid var(--border);
    padding: 12px 32px;
  }
  .sport-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
  .sport-tab {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border2); border-radius: 8px;
    padding: 8px 18px; cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--muted); transition: all .2s; display: flex; align-items: center; gap: 8px;
    user-select: none;
  }
  .sport-tab:hover { border-color: var(--blue); color: var(--text); }
  .sport-tab.active { background: rgba(74,158,255,0.12); border-color: var(--blue); color: #fff; }
  .sport-tab .icon { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
  .tab-badge {
    background: var(--blue); color: #fff; font-size: 10px; padding: 1px 7px;
    border-radius: 10px; font-weight: 700; min-width: 20px; text-align: center;
  }

  /* Disc filter rows */
  .disc-filters { display: flex; flex-direction: column; gap: 6px; }
  .disc-filter-row { display: flex; align-items: center; gap: 6px; }
  .disc-filter-label { font-size: 9px; text-transform: uppercase; letter-spacing: .5px; color: var(--dim); min-width: 32px; }
  .disc-tabs { display: flex; gap: 3px; }
  .disc-tab {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border2); border-radius: 5px;
    padding: 3px 8px; cursor: pointer; font-size: 10px; font-weight: 600;
    color: var(--muted); transition: all .15s; user-select: none;
  }
  .disc-tab:hover { border-color: var(--red); color: var(--text); }
  .disc-tab.active { background: rgba(248,113,113,0.15); border-color: var(--red); color: var(--red); }
  .disc-mode { display: flex; gap: 3px; }
  .disc-mode-tab {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border2); border-radius: 5px;
    padding: 3px 8px; cursor: pointer; font-size: 10px; font-weight: 600;
    color: var(--muted); transition: all .15s; user-select: none;
  }
  .disc-mode-tab:hover { border-color: var(--purple); color: var(--text); }
  .disc-mode-tab.active { background: rgba(167,139,250,0.15); border-color: var(--purple); color: var(--purple); }

  /* Main layout with sidebar */
  main { padding: 20px 32px; max-width: 1800px; display: flex; gap: 20px; flex: 1; }
  .main-content { flex: 1; min-width: 0; }

  /* Error Log Sidebar */
  .error-log {
    width: 320px; flex-shrink: 0; background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
    border: 1px solid var(--border); border-radius: 10px; padding: 14px; height: fit-content;
    position: sticky; top: 20px; max-height: calc(100vh - 40px); display: flex; flex-direction: column;
  }
  .error-log-header {
    margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border2);
  }
  .error-log-header-top {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  .error-log-header h3 { font-size: 13px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: .8px; display: flex; align-items: center; gap: 6px; }
  .error-log-count { background: var(--red); color: #fff; font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 700; }
  .error-log-list { overflow-y: auto; flex: 1; }
  .error-log-list::-webkit-scrollbar { width: 4px; }
  .error-log-list::-webkit-scrollbar-track { background: transparent; }
  .error-log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .error-log-item {
    background: rgba(248,113,113,0.06); border: 1px solid rgba(248,113,113,0.15);
    border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; cursor: pointer;
    transition: all .15s; font-size: 11px;
  }
  .error-log-item:hover { border-color: var(--red); background: rgba(248,113,113,0.12); }
  .error-log-item .eli-event { color: #fff; font-weight: 600; font-size: 12px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .error-log-item .eli-detail { color: var(--muted); line-height: 1.4; }
  .error-log-item .eli-range { color: var(--red); font-weight: 600; }
  .error-log-item .eli-market { color: var(--yellow); }
  .error-log-empty { color: var(--dim); font-size: 12px; text-align: center; padding: 20px 0; }
  .loading { text-align: center; padding: 60px; color: var(--muted); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Skeleton loading */
  @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  .skeleton {
    background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
    background-size: 800px 100%; animation: shimmer 1.5s infinite linear; border-radius: 8px;
  }
  .skel-card {
    border: 1px solid var(--border); border-radius: 8px; padding: 10px; height: 70px;
  }
  .skel-header { height: 60px; border-radius: 10px; margin-bottom: 16px; }
  .skel-table { height: 200px; border-radius: 10px; margin-bottom: 16px; }
  .skel-line { height: 14px; border-radius: 4px; margin-bottom: 8px; }
  .skel-line.w60 { width: 60%; }
  .skel-line.w40 { width: 40%; }
  .skel-line.w80 { width: 80%; }

  /* Notice banner */
  .notice {
    background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25);
    border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; font-size: 13px; color: var(--yellow);
  }

  /* Status Tabs (Completed / Upcoming) */
  .status-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .status-tab {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border2); border-radius: 8px;
    padding: 8px 20px; cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--muted); transition: all .2s; user-select: none;
    display: flex; align-items: center; gap: 8px;
  }
  .status-tab:hover { border-color: var(--blue); color: var(--text); }
  .status-tab.active { background: rgba(74,158,255,0.12); border-color: var(--blue); color: #fff; }
  .status-tab .tab-badge {
    background: var(--blue); color: #fff; font-size: 10px; padding: 1px 7px;
    border-radius: 10px; font-weight: 700; min-width: 20px; text-align: center;
  }

  /* Match List */
  .section-header { font-size: 16px; margin-bottom: 14px; color: #fff; display: flex; align-items: center; gap: 8px; }
  .badge { background: var(--blue); color: #fff; font-size: 11px; padding: 2px 10px; border-radius: 12px; font-weight: 600; }
  .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; margin-bottom: 20px; }
  .match-card {
    background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer;
    transition: all .2s;
  }
  .match-card:hover { border-color: var(--blue); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .match-card .mc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .match-card .mc-time { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .match-card .mc-status { font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
  .mc-status.upcoming { background: rgba(74,158,255,0.15); color: var(--blue); }
  .mc-status.live { background: rgba(52,211,153,0.15); color: var(--green); }
  .mc-status.live .pulse-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; margin-right: 2px; vertical-align: middle; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .mc-status.final { background: rgba(107,127,163,0.15); color: var(--muted); }
  .match-card .mc-teams { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 3px; }
  .match-card .mc-meta { display: flex; gap: 8px; font-size: 10px; color: var(--muted); }
  .mc-meta .mc-score { color: var(--green); font-weight: 600; }
  .mc-meta .mc-mkts { color: var(--dim); }
  .mc-no-odds { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--yellow); margin-top: 2px; }
  .mc-trades { color: var(--blue); font-weight: 600; font-size: 10px; }

  /* Market Detail View */
  .detail-view { display: none; }
  .detail-view.active { display: block; }
  .back-btn {
    background: none; border: 1px solid var(--border2); border-radius: 6px;
    color: var(--muted); font-size: 12px; padding: 6px 14px; cursor: pointer;
    transition: all .2s; margin-bottom: 16px; display: inline-flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { color: var(--blue); border-color: var(--blue); }
  .detail-header {
    background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
    border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px;
  }
  .detail-header .dh-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .detail-header .dh-meta { font-size: 12px; color: var(--muted); display: flex; gap: 16px; }
  .dh-meta .dh-score { color: var(--green); font-weight: 600; }

  /* Market group */
  .market-group { margin-bottom: 24px; }
  .market-group-title {
    font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--yellow); margin-bottom: 8px; padding-left: 4px;
  }

  /* Odds Table */
  .table-wrapper { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
  .table-wrapper::-webkit-scrollbar { height: 6px; }
  .table-wrapper::-webkit-scrollbar-track { background: #0d1525; }
  .table-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .odds-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .odds-table th {
    text-align: left; padding: 8px 10px; font-size: 10px; text-transform: uppercase;
    letter-spacing: .8px; color: var(--muted); border-bottom: 2px solid var(--border);
    background: #0d1525; position: sticky; top: 0; z-index: 1; cursor: pointer;
    user-select: none; white-space: nowrap;
  }
  .odds-table th:hover { color: var(--blue); }
  .odds-table th .sort-arrow { font-size: 9px; margin-left: 3px; color: var(--blue); }
  .odds-table td { padding: 6px 10px; border-bottom: 1px solid var(--border2); white-space: nowrap; }
  .odds-table tr:hover td { background: rgba(74,158,255,0.03); }
  .odds-table .question-cell { color: #fff; font-weight: 600; max-width: 250px; overflow: hidden; text-overflow: ellipsis; }
  .odds-table .outcome-cell { color: var(--text); max-width: 180px; white-space: nowrap; }
  .odds-table .outcome-cell .oc-name { overflow: hidden; text-overflow: ellipsis; display: inline-block; max-width: calc(100% - 40px); vertical-align: bottom; }
  .odds-table .outcome-cell .oc-line { white-space: nowrap; font-weight: 600; }
  .odds-table .odds-val { font-weight: 500; }
  .odds-table .null-val { color: var(--dim); }
  .odds-table .highlight-red { background: rgba(248,113,113,0.15); color: var(--red); font-weight: 600; }
  .odds-table .prob-cell { color: var(--purple); }

  /* Grouping rows */
  .odds-table .group-row td { border-bottom: 2px solid var(--border); }

  /* Show More button */
  .show-more-btn {
    display: block; width: 100%; padding: 10px; margin: 8px 0 20px; border: 1px dashed var(--border);
    border-radius: 8px; background: rgba(255,255,255,0.02); color: var(--muted); font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all .2s; text-align: center;
  }
  .show-more-btn:hover { border-color: var(--blue); color: var(--blue); background: rgba(74,158,255,0.05); }

  /* ---- Prediction Cards ---- */
  .predictions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 16px; margin-bottom: 40px; }
  .pred-card { background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: border-color .2s; position: relative; z-index: 1; }
  .pred-card:hover { border-color: var(--blue); }
  .pred-card:has(.card-details.open) { z-index: 10; border-color: var(--blue); border-radius: 12px 12px 0 0; }
  .card-details { display: none; }
  .card-details.open { display: block; position: absolute; left: 0; right: 0; top: 100%; background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%); border: 1px solid var(--blue); border-top: none; border-radius: 0 0 12px 12px; padding: 18px; z-index: 10; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .card-header .datetime { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .card-header .conf-badge { font-size: 13px; font-weight: 700; padding: 4px 12px; border-radius: 6px; color: #fff; }
  .matchup { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .team { flex: 1; text-align: center; }
  .team .name { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .team .record { font-size: 12px; color: var(--muted); }
  .team.winner .name { color: var(--green); }
  .vs { font-size: 12px; font-weight: 700; color: #3a4a6c; padding: 0 10px; }
  .odds-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .odds-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border2); border-radius: 8px; padding: 8px; }
  .odds-box .odds-title { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--yellow); font-weight: 600; margin-bottom: 6px; text-align: center; }
  .odds-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 3px; }
  .odds-row .odds-team { color: var(--text); max-width: 55%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .odds-row .odds-val { font-weight: 600; }
  .odds-fav { color: var(--green); }
  .odds-dog { color: var(--red); }
  .odds-pick { color: var(--green); font-weight: 700; background: rgba(52,211,153,0.12); padding: 1px 6px; border-radius: 4px; }
  .odds-line { text-align: center; font-size: 11px; color: var(--yellow); font-weight: 600; margin-bottom: 2px; }
  .odds-na { color: var(--dim); font-style: italic; }
  .expand-btn {
    width: 100%; background: none; border: 1px solid var(--border2); border-radius: 6px;
    color: var(--muted); font-size: 11px; padding: 6px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 1px; transition: all .2s; margin-top: 8px;
  }
  .expand-btn:hover { color: var(--blue); border-color: var(--blue); }
  .signals { border-top: 1px solid var(--border2); padding-top: 10px; margin-bottom: 10px; }
  .sig-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .sig-label { width: 70px; flex-shrink: 0; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .sig-bar-wrap { flex: 1; display: flex; align-items: center; gap: 5px; }
  .sig-pct { width: 30px; text-align: right; font-weight: 700; font-size: 11px; }
  .sig-pct.t1 { color: var(--green); }
  .sig-pct.t2 { color: var(--blue); }
  .sig-bar-bg { flex: 1; height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; display: flex; }
  .sig-bar-t1 { height: 100%; background: var(--green); border-radius: 3px 0 0 3px; }
  .sig-bar-t2 { height: 100%; background: var(--blue); border-radius: 0 3px 3px 0; margin-left: auto; }
  .sig-detail { font-size: 9px; color: var(--dim); width: 80px; text-align: center; flex-shrink: 0; }
  .deep-dive { border-top: 1px solid var(--border2); padding-top: 10px; margin-bottom: 10px; }
  .dd-section { margin-bottom: 8px; }
  .dd-title { font-size: 9px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 4px; }
  .dd-row { display: flex; gap: 12px; font-size: 12px; flex-wrap: wrap; }
  .dd-stat { background: rgba(255,255,255,0.03); border-radius: 4px; padding: 3px 8px; }
  .dd-stat span { color: var(--muted); font-size: 10px; }
  .dd-stat strong { color: #fff; }
  .h2h-game { font-size: 11px; color: var(--muted); padding: 2px 0; }
  .h2h-game .h2h-score { color: #fff; font-weight: 600; }
  .h2h-game .h2h-winner { color: var(--green); }
  .conf-section { padding-top: 8px; }
  .conf-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .conf-header .predicted { color: var(--green); font-weight: 700; }
  .conf-header .pct { font-weight: 700; color: #fff; font-size: 15px; }
  .conf-bar-bg { height: 10px; background: var(--border2); border-radius: 5px; overflow: hidden; }
  .conf-bar { height: 100%; border-radius: 5px; }
  .tracker-table { width: 100%; border-collapse: collapse; }
  .tracker-table th { text-align: left; padding: 10px 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 2px solid var(--border); background: #0d1525; position: sticky; top: 0; z-index: 1; }
  .tracker-table td { padding: 8px 12px; border-bottom: 1px solid var(--border2); font-size: 12px; }
  .tracker-table tr:hover td { background: rgba(74,158,255,0.03); }
  .tracker-stats { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .tracker-stat { background: rgba(255,255,255,0.03); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 16px; text-align: center; }
  .tracker-stat .num { font-size: 18px; font-weight: 700; }
  .tracker-stat .label { font-size: 10px; text-transform: uppercase; color: var(--muted); }
  .results-table { width: 100%; border-collapse: collapse; }
  .results-table th { text-align: left; padding: 10px 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 2px solid var(--border); background: #0d1525; position: sticky; top: 0; z-index: 1; }
  .results-table td { padding: 8px 12px; border-bottom: 1px solid var(--border2); font-size: 12px; }
  .results-table tr:hover td { background: rgba(74,158,255,0.03); }
  .score-cell { font-weight: 700; color: #fff; }
  .result-correct { color: var(--green); font-weight: 600; }
  .result-incorrect { color: var(--red); font-weight: 600; }
  .result-na { color: var(--muted); }
  .tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; display: inline-block; margin: 1px 2px; }
  .tag-spread { background: rgba(52,211,153,0.1); color: var(--green); }
  .tag-total { background: rgba(251,191,36,0.1); color: var(--yellow); }
  .tag-ml { background: rgba(74,158,255,0.1); color: var(--blue); }
  .tag-dim { opacity: 0.4; }
  .pred-loading { text-align: center; padding: 60px; color: var(--muted); }
  .pred-stats-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }

async function q(table, params = '', range = null) {
  const headers = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };
  if (range) headers.Range = range;
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers });
  if (!r.ok) throw new Error(`API ${r.status}: ${table}`);
  const text = await r.text();
  if (!text) return [];
  return JSON.parse(text);
}

async function qAll(table, params = '') {
  const PG = 1000; let all = [], off = 0;
  while (true) {
    const page = await q(table, params, `${off}-${off + PG - 1}`);
    all = all.concat(page);
    if (page.length < PG) break;
    off += PG;
  }
  return all;
}

// ---- Odds matching project (separate Supabase instance) ----
async function qOdds(table, params = '', range = null) {
  const headers = { apikey: SB_ODDS_KEY, Authorization: `Bearer ${SB_ODDS_KEY}` };
  if (range) headers.Range = range;
  const r = await fetch(`${SB_ODDS_URL}/rest/v1/${table}?${params}`, { headers });
  if (!r.ok) throw new Error(`API ${r.status}: ${table}`);
  const text = await r.text();
  if (!text) return [];
  return JSON.parse(text);
}
async function qAllOdds(table, params = '') {
  const PG = 1000; let all = [], off = 0;
  while (true) {
    const page = await qOdds(table, params, `${off}-${off + PG - 1}`);
    all = all.concat(page);
    if (page.length < PG) break;
    off += PG;
  }
  return all;
}

}

  for (const m of markets) {
    // Remap market type to the names the rest of the app uses
    m.sports_market_type = MARKET_TYPE_MAP[m.sports_market_type] || m.sports_market_type;

    // Synthetic slug and question so downstream rendering works unchanged
    const slug = `${key}-${slugify(m.home_team)}-${slugify(m.away_team)}-${m.date}`;
    m.event_slug = slug;
    const pair = `${m.home_team} vs ${m.away_team}`;
    if (m.sports_market_type === 'totals') {
      m.question = `${pair}: O/U ${m.line ?? ''}`.trim();
    } else if (m.sports_market_type === 'spreads') {
      m.question = `Spread: ${pair}${m.line != null ? ` (${m.line})` : ''}`;
    } else {
      m.question = pair;
    }

    if (!grouped[slug]) grouped[slug] = [];
    // Deduplicate: skip if an identical (type + oc1 + oc2 + line) row already exists
    // for this event (the DB sometimes has duplicate moneyline rows).
    const isDup = grouped[slug].some(
      (prev) =>
        prev.sports_market_type === m.sports_market_type &&
        prev.oc1_name === m.oc1_name &&
        prev.oc2_name === m.oc2_name &&
        prev.line === m.line
    );
    if (!isDup) grouped[slug].push(m);

    if (!eventMap.has(slug)) {
      const hasScore = m.home_score != null && m.away_score != null;
      eventMap.set(slug, {
        slug,
        title: pair,
        start_time_utc: `${m.date}T00:00:00Z`,
        date: m.date,
        score: hasScore ? `${m.home_score}-${m.away_score}` : null,
        ended: hasScore,
        live: false,
      });
    }
  }

  // Categorise by date (no live flag in new schema; today without a score = upcoming)
  const todayIso = new Date().toISOString().slice(0, 10);
  const live = [];
  const upcoming = [];
  const completed = [];
  for (const ev of eventMap.values()) {
    if (ev.ended) {
      completed.push(ev);
    } else if (ev.date >= todayIso) {
      upcoming.push(ev);
    } else {
      completed.push(ev);
    }
  }
  upcoming.sort((a, b) => a.date.localeCompare(b.date));
  completed.sort((a, b) => b.date.localeCompare(a.date));

  const events = [...live, ...upcoming, ...completed];

  sportData[key] = { events, live, upcoming, completed, markets, grouped };
  upcomingCounts[key] = upcoming.length;
  return sportData[key];
}

// ---- Utilities ----
function fmtDate(u) {
  if (!u) return 'TBD';
  const d = new Date(u);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
    + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
function fmtOdds(v) { return v != null ? v.toFixed(2) : '-'; }
function fmtProb(v) { return v != null ? v.toFixed(1) + '%' : '-'; }

// ---- Render Sport Tabs ----
function renderTabs() {
  const container = document.getElementById('sport-tabs');
  container.innerHTML = Object.entries(SPORTS).map(([key, cfg]) => {
    return `<div class="sport-tab ${key === activeSport ? 'active' : ''}" data-sport="${key}" onclick="switchSport('${key}')" title="${cfg.label}">
      <img class="icon" src="${cfg.icon}" alt="${cfg.label}">
    </div>`;
  }).join('');
}

// ---- Render Match List ----
let showAllUpcoming = false;

function marketHasTrades(m) {
  return ((m.oc1_trades ?? 0) + (m.oc2_trades ?? 0) + (m.oc3_trades ?? 0)) >= 1;
}

function marketHasAnyPrice(m) {
  return (
    m.oc1_pinn_odds != null || m.oc2_pinn_odds != null || m.oc3_pinn_odds != null ||
    m.oc1_fanduel_odds != null || m.oc2_fanduel_odds != null || m.oc3_fanduel_odds != null ||
    m.oc1_fanatics_odds != null || m.oc2_fanatics_odds != null || m.oc3_fanatics_odds != null
  );
}

function getMarketsWithTrades(grouped, slug, cfg) {
  const markets = grouped[slug] || [];
  if (cfg && !cfg.hasTrades) return markets;
  // Keep a market if it has Polymarket trades OR any bookmaker price.
  return markets.filter((m) => marketHasTrades(m) || marketHasAnyPrice(m));
}

function evHasMarkets(ev, cfg, grouped) {
  return getMarketsWithTrades(grouped, ev.slug, cfg).length > 0;
}

let activeStatusTab = 'live';

function setStatusTab(tab) {
  activeStatusTab = tab;
  renderMatchList();
}

function renderMatchList() {
  const data = sportData[activeSport];
  if (!data) return;
  const cfg = SPORTS[activeSport];
  const listEl = document.getElementById('match-list-view');

  // Filter live/completed to events with markets; upcoming shows everything.
  const liveWithMkts = (data.live || []).filter(ev => evHasMarkets(ev, cfg, data.grouped));
  const upcomingWithMkts = data.upcoming; // show all upcoming, even without odds_matching rows
  const completedWithMkts = data.completed.filter(ev => evHasMarkets(ev, cfg, data.grouped));

  // Auto-select best tab if current has no events
  if (activeStatusTab === 'live' && liveWithMkts.length === 0 && upcomingWithMkts.length > 0) {
    activeStatusTab = 'upcoming';
  } else if (activeStatusTab === 'live' && liveWithMkts.length === 0 && upcomingWithMkts.length === 0) {
    activeStatusTab = 'completed';
  }

  let html = '';

  // Status tabs
  html += `<div class="status-tabs">
    <div class="status-tab ${activeStatusTab === 'live' ? 'active' : ''}" onclick="setStatusTab('live')">
      <span style="display:inline-flex;align-items:center;gap:4px;">
        <span style="width:6px;height:6px;border-radius:50%;background:${liveWithMkts.length > 0 ? 'var(--green)' : 'var(--dim)'};${liveWithMkts.length > 0 ? 'animation:pulse 2s ease-in-out infinite' : ''}"></span>
        Live
      </span>
      <span class="tab-badge">${liveWithMkts.length}</span>
    </div>
    <div class="status-tab ${activeStatusTab === 'upcoming' ? 'active' : ''}" onclick="setStatusTab('upcoming')">
      Upcoming <span class="tab-badge">${upcomingWithMkts.length}</span>
    </div>
    <div class="status-tab ${activeStatusTab === 'completed' ? 'active' : ''}" onclick="setStatusTab('completed')">
      Completed <span class="tab-badge">${completedWithMkts.length}</span>
    </div>
  </div>`;

  if (activeStatusTab === 'live') {
    if (liveWithMkts.length > 0) {
      html += '<div class="match-grid">';
      for (const ev of liveWithMkts) {
        const mkts = getMarketsWithTrades(data.grouped, ev.slug, cfg);
        html += renderMatchCard(ev, mkts, false);
      }
      html += '</div>';
    } else {
      html += `<div class="notice">No live ${cfg.label} events with markets.</div>`;
    }
  } else if (activeStatusTab === 'upcoming') {
    if (upcomingWithMkts.length > 0) {
      html += '<div class="match-grid">';
      for (const ev of upcomingWithMkts) {
        const mkts = getMarketsWithTrades(data.grouped, ev.slug, cfg);
        html += renderMatchCard(ev, mkts, false);
      }
      html += '</div>';
    } else {
      html += `<div class="notice">No upcoming ${cfg.label} events with markets.</div>`;
    }
  } else {
    if (completedWithMkts.length > 0) {
      html += '<div class="match-grid">';
      for (const ev of completedWithMkts) {
        const mkts = getMarketsWithTrades(data.grouped, ev.slug, cfg);
        html += renderMatchCard(ev, mkts, true);
      }
      html += '</div>';
    } else {
      html += `<div class="notice">No completed ${cfg.label} events with markets.</div>`;
    }
  }

  listEl.innerHTML = html;
  listEl.style.display = '';
  renderErrorLog();
}

function marketHasOdds(m, cfg) {
  for (const book of cfg.books) {
    if (m[book.col1] != null || m[book.col2] != null) return true;
  }
  return false;
}

function renderMatchCard(ev, mkts, isCompleted) {
  const cfg = SPORTS[activeSport];
  const isLive = ev.live && !ev.ended;
  const isFinal = !!ev.ended;
  const statusClass = isLive ? 'live' : isFinal ? 'final' : 'upcoming';
  const statusText = isLive ? '<span class="pulse-dot"></span> Live' : isFinal ? 'Final' : 'Upcoming';
  const mktCount = mkts.length;
  const typeSet = new Set(mkts.map(m => m.sports_market_type));
  const typeList = [...typeSet].join(', ');
  const noOdds =
    (isFinal && mkts.length > 0 && !mkts.some(m => marketHasOdds(m, cfg))) ||
    (!isFinal && !isLive && mkts.length === 0);

  // Sum trades across all markets for each outcome
  let totalOc1 = 0, totalOc2 = 0, totalOc3 = 0;
  for (const m of mkts) {
    totalOc1 += m.oc1_trades ?? 0;
    totalOc2 += m.oc2_trades ?? 0;
    totalOc3 += m.oc3_trades ?? 0;
  }
  const totalTrades = totalOc1 + totalOc2 + totalOc3;

  return `<div class="match-card" onclick="openDetail('${ev.slug}')">
    <div class="mc-header">
      <span class="mc-time">${fmtDate(ev.start_time_utc)}</span>
      <span class="mc-status ${statusClass}">${statusText}</span>
    </div>
    <div class="mc-teams">${ev.title}</div>
    <div class="mc-meta">
      ${ev.score ? `<span class="mc-score">${ev.score}</span>` : ''}
      <span class="mc-mkts">${mktCount} markets${typeList ? ' · ' + typeList : ''}</span>
    </div>
    ${noOdds ? '<div class="mc-no-odds">&#9888; No odds</div>' : ''}
  </div>`;
}

// ---- Render Market Detail ----
function openDetail(slug) {
  navigate(activeSport, slug);
}

function openDetailDirect(slug) {
  currentSlug = slug;
  const data = sportData[activeSport];
  const cfg = SPORTS[activeSport];
  const ev = data.events.find(e => e.slug === slug);
  if (!ev) return;

  const mkts = getMarketsWithTrades(data.grouped, slug, cfg);
  const detailEl = document.getElementById('detail-view');
  document.getElementById('match-list-view').style.display = 'none';
  detailEl.classList.add('active');

  let html = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
    <button class="back-btn" style="margin-bottom:0" onclick="closeDetail()">\u2190 Back to matches</button>
    <button class="back-btn" style="margin-bottom:0" id="refresh-btn" onclick="refreshDetail()">&#8635; Refresh</button>
    <span id="refresh-status" style="font-size:11px;color:var(--muted);"></span>
  </div>`;
  html += `<div class="detail-header">
    <div class="dh-title">${ev.title}</div>
    <div class="dh-meta">
      <span>${fmtDate(ev.start_time_utc)}</span>
      ${ev.score && ev.live && !ev.ended
        ? `<span class="dh-score" style="color:var(--green);">Live: ${ev.score}</span>`
        : ev.score && ev.ended
        ? `<span class="dh-score">Final: ${ev.score}</span>`
        : ev.live && !ev.ended
        ? `<span style="color:var(--green);font-weight:600;">Live</span>`
        : '<span>Upcoming</span>'}
    </div>
  </div>`;

  // Group markets by type, preserve order from config
  const byType = {};
  for (const m of mkts) {
    const t = m.sports_market_type;
    if (!byType[t]) byType[t] = [];
    byType[t].push(m);
  }

  // Render in preferred order
  const typeOrder = cfg.marketTypes;
  const allTypes = [...new Set([...typeOrder, ...Object.keys(byType)])];

  for (const type of allTypes) {
    const rows = byType[type];
    if (!rows || rows.length === 0) continue;

    html += `<div class="market-group">
      <div class="market-group-title">${formatMarketType(type)} <span style="font-weight:400;color:var(--dim);font-size:11px">(${rows.length})</span></div>`;
    html += renderOddsTable(rows, cfg, type);
    html += `</div>`;
  }

  detailEl.innerHTML = html;
  renderErrorLog();
}

function closeDetail() {
  navigate(activeSport, null);
}

function closeDetailDirect() {
  currentSlug = null;
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('detail-view').innerHTML = '';
  document.getElementById('match-list-view').style.display = '';
  renderErrorLog();
}

async function refreshDetail() {
  if (!currentSlug) return;
  const btn = document.getElementById('refresh-btn');
  const status = document.getElementById('refresh-status');
  if (btn) btn.disabled = true;
  if (status) status.textContent = 'Refreshing...';

  try {
    const slug = currentSlug;
    // New schema has no event_slug column — reload everything and re-open.
    await loadSport(activeSport);
    openDetailDirect(slug);
    if (status) status.textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (err) {
    if (status) status.textContent = 'Error: ' + err.message;
  } finally {
    if (btn) btn.disabled = false;
  }
}

function formatMarketType(t) {
  return t.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// ---- Build Odds Table ----
function formatOutcome(outcome) {
  if (!outcome) return '-';
  // Match a trailing line value like " -1.5", " +2.5", " 1.5"
  const match = outcome.match(/^(.+?)\s+([+-]?\d+(?:\.\d+)?)$/);
  if (match) {
    const name = match[1];
    const line = match[2];
    // Short names (Over, Under, etc.) don't need truncation
    if (name.length <= 10) return escHtml(outcome);
    return `<span class="oc-name">${escHtml(name)}</span> <span class="oc-line">${escHtml(line)}</span>`;
  }
  return escHtml(outcome);
}

function formatQuestion(q, marketType, cfg, line) {
  const mt = (marketType || '').toLowerCase();
  if (mt === 'moneyline') return 'H2H';
  if (mt === 'spreads') return line != null ? `Line ${line}` : 'Line';
  if (mt === 'totals') {
    if (line != null) return `O/U ${line}`;
    const ouMatch = (q || '').match(/O\/U\s*([\d.]+)/i);
    if (ouMatch) return `O/U ${ouMatch[1]}`;
    return 'O/U';
  }
  return q || '';
}

function renderOddsTable(markets, cfg, type) {
  // Build enriched rows: each market produces 2 or 3 rows
  const tableRows = [];
  for (const m of markets) {
    const row1 = buildRow(m, 1, cfg);
    const row2 = buildRow(m, 2, cfg);
    const rows = [row1, row2];
    // Three-way markets (soccer moneyline): add outcome 3 if present
    if (cfg.threeWay && m.oc3_name) {
      rows.push(buildRow(m, 3, cfg));
    }
    tableRows.push({ question: formatQuestion(m.question, m.sports_market_type, cfg, m.line), line: m.line, m, rows });
  }

  // Build column definitions
  const cols = [
    { key: 'question', label: 'Question', sortable: false, type: 'text' },
  ];
  if (cfg.hasTrades) {
    cols.push({ key: 'trades', label: 'Trades', sortable: true, type: 'num' });
  }
  cols.push({ key: 'outcome', label: 'Outcome', sortable: false, type: 'text' });

  for (const book of cfg.books) {
    cols.push({ key: 'odds_' + book.key, label: book.label, sortable: true, type: 'num' });
  }
  for (const fb of cfg.fairBooks) {
    cols.push({ key: 'fair_' + fb.key, label: fb.label, sortable: true, type: 'num' });
  }

  cols.push({ key: 'blendedOdds', label: 'Blended Odds', sortable: true, type: 'num' });
  if (cfg.fairBooks.length > 0) {
    cols.push({ key: 'blendedFair', label: 'Blended Fair', sortable: true, type: 'num' });
  }
  cols.push({ key: 'oddsRange', label: 'Odds Range', sortable: true, type: 'num' });
  if (cfg.fairBooks.length > 0) {
    cols.push({ key: 'fairRange', label: 'Fair Range', sortable: true, type: 'num' });
  }
  if (cfg.hasProbs) {
    cols.push({ key: 'origProb', label: 'Orig Prob %', sortable: true, type: 'num' });
    cols.push({ key: 'fairProb', label: 'Fair Prob %', sortable: true, type: 'num' });
  }
  if (cfg.hasWinner) {
    cols.push({ key: 'winner', label: 'Winner', sortable: false, type: 'text' });
  }

  const tableId = 'tbl-' + type + '-' + Math.random().toString(36).slice(2, 8);

  let html = `<div class="table-wrapper"><table class="odds-table" id="${tableId}"><thead><tr>`;
  for (const col of cols) {
    html += `<th data-col="${col.key}" ${col.sortable ? `onclick="sortTable('${tableId}', '${col.key}', '${col.type}')"` : ''}>${col.label}${col.sortable ? '<span class="sort-arrow"></span>' : ''}</th>`;
  }
  html += '</tr></thead><tbody>';

  for (let i = 0; i < tableRows.length; i++) {
    const tr = tableRows[i];
    const isLast = i === tableRows.length - 1;
    const groupClass = !isLast ? '' : ' group-row';

    const rowCount = tr.rows.length;
    for (let r = 0; r < rowCount; r++) {
      const row = tr.rows[r];
      html += `<tr class="${r === rowCount - 1 ? groupClass : ''}" data-sort-group="${i}">`;

      for (const col of cols) {
        if (col.key === 'question') {
          if (r === 0) {
            html += `<td class="question-cell" rowspan="${rowCount}">${escHtml(tr.question || '')}</td>`;
          }
          continue;
        }
        if (col.key === 'trades') {
          const tv = row.trades;
          const hasVal = tv != null && tv > 0;
          html += `<td class="odds-val" data-val="${hasVal ? tv : ''}" style="color:${hasVal ? 'var(--blue)' : 'var(--dim)'}">${hasVal ? tv.toLocaleString() : '-'}</td>`;
          continue;
        }
        if (col.key === 'outcome') {
          html += `<td class="outcome-cell">${formatOutcome(row.outcome)}</td>`;
          continue;
        }
        if (col.key === 'winner') {
          if (r === 0) {
            html += `<td rowspan="${rowCount}" style="color:var(--green);font-weight:600">${escHtml(tr.m.winning_outcome || '-')}</td>`;
          }
          continue;
        }

        const val = row[col.key];
        let cls = 'odds-val';
        let display = '-';

        if (val != null) {
          if (col.key === 'oddsRange') {
            display = row.oddsRangeMin != null ? row.oddsRangeMin.toFixed(2) + '-' + row.oddsRangeMax.toFixed(2) : val.toFixed(2);
            const avg = row.oddsRangeMin != null ? (row.oddsRangeMin + row.oddsRangeMax) / 2 : 0;
            if (avg > 0 && val / avg > discThreshold) cls = 'highlight-red';
          } else if (col.key === 'fairRange') {
            display = row.fairRangeMin != null ? row.fairRangeMin.toFixed(2) + '-' + row.fairRangeMax.toFixed(2) : val.toFixed(2);
            const avg = row.fairRangeMin != null ? (row.fairRangeMin + row.fairRangeMax) / 2 : 0;
            if (avg > 0 && val / avg > discThreshold) cls = 'highlight-red';
          } else if (col.key === 'origProb' || col.key === 'fairProb') {
            display = val.toFixed(1) + '%';
            cls = 'prob-cell';
          } else {
            display = val.toFixed(2);
          }
        } else {
          cls = 'null-val';
        }

        html += `<td class="${cls}" data-val="${val != null ? val : ''}">${display}</td>`;
      }
      html += '</tr>';
    }
  }

  html += '</tbody></table></div>';
  return html;
}

function buildRow(m, outcomeNum, cfg) {
  const pre = cfg.oc(outcomeNum);
  const row = {
    outcome: m[pre + 'name'] || '',
    trades: m[pre + 'trades'] ?? null,
  };

  // Book odds
  const oddsVals = [];
  for (const book of cfg.books) {
    const val = m[book['col' + outcomeNum]];
    row['odds_' + book.key] = val;
    if (val != null) oddsVals.push(val);
  }

  // Fair values
  const fairVals = [];
  for (const fb of cfg.fairBooks) {
    const val = m[fb['col' + outcomeNum]];
    row['fair_' + fb.key] = val;
    if (val != null) fairVals.push(val);
  }

  // Blended odds: use DB blend if available, else calc client-side
  if (cfg.hasDbBlend) {
    row.blendedOdds = m[pre + 'og_blend'] ?? (oddsVals.length > 0 ? oddsVals.reduce((s, v) => s + v, 0) / oddsVals.length : null);
    row.blendedFair = m[pre + 'fair_blend'] ?? (fairVals.length > 0 ? fairVals.reduce((s, v) => s + v, 0) / fairVals.length : null);
  } else {
    row.blendedOdds = oddsVals.length > 0 ? oddsVals.reduce((s, v) => s + v, 0) / oddsVals.length : null;
    row.blendedFair = fairVals.length > 0 ? fairVals.reduce((s, v) => s + v, 0) / fairVals.length : null;
  }

  // Odds range: store min, max, and spread for display + highlighting
  if (oddsVals.length > 1) {
    row.oddsRangeMin = Math.min(...oddsVals);
    row.oddsRangeMax = Math.max(...oddsVals);
    row.oddsRange = row.oddsRangeMax - row.oddsRangeMin;
  } else if (oddsVals.length === 1) {
    row.oddsRangeMin = oddsVals[0]; row.oddsRangeMax = oddsVals[0]; row.oddsRange = 0;
  } else {
    row.oddsRangeMin = null; row.oddsRangeMax = null; row.oddsRange = null;
  }

  // Fair range
  if (fairVals.length > 1) {
    row.fairRangeMin = Math.min(...fairVals);
    row.fairRangeMax = Math.max(...fairVals);
    row.fairRange = row.fairRangeMax - row.fairRangeMin;
  } else if (fairVals.length === 1) {
    row.fairRangeMin = fairVals[0]; row.fairRangeMax = fairVals[0]; row.fairRange = 0;
  } else {
    row.fairRangeMin = null; row.fairRangeMax = null; row.fairRange = null;
  }

  // Probabilities (NFL only)
  if (cfg.hasProbs) {
    row.origProb = m[pre + cfg.probField];
    row.fairProb = m[pre + 'fair_prob'];
  }

  return row;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ---- Discrepancy Detection ----

// Mode: prob — OG Prob vs Fair Prob
function getProbDiff(m, cfg, outcomeNum) {
  const pre = cfg.oc(outcomeNum);
  const ogProb = m[pre + cfg.probField];
  const fairProb = m[pre + 'fair_prob'];
  if (ogProb == null || fairProb == null) return null;
  const diff = Math.abs(ogProb - fairProb);
  return { mode: 'prob', ogProb, fairProb, diff, pct: diff / 100 };
}

// Mode: range — odds range across all books
function getOddsRange(m, cfg, outcomeNum) {
  const vals = [];
  for (const book of cfg.books) {
    const v = m[book['col' + outcomeNum]];
    if (v != null) vals.push(v);
  }
  if (vals.length < 2) return null;
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const avg = (min + max) / 2;
  if (avg === 0) return null;
  return { mode: 'range', min, max, diff: max - min, pct: (max - min) / avg };
}

function findDiscrepancies(slug, cfg, grouped) {
  const mkts = getMarketsWithTrades(grouped, slug, cfg);
  const discs = [];
  for (const m of mkts) {
    for (const oc of [1, 2]) {
      const r = discMode === 'prob' ? getProbDiff(m, cfg, oc) : getOddsRange(m, cfg, oc);
      if (r && r.pct > discThreshold) {
        const trades = (m[cfg.oc(1) + 'trades'] || 0) + (m[cfg.oc(2) + 'trades'] || 0);
        discs.push({
          question: m.question,
          type: m.sports_market_type,
          outcome: m[cfg.oc(oc) + 'name'],
          ...r,
          trades,
        });
      }
    }
  }
  return discs;
}

function renderDiscTabs() {
  document.getElementById('disc-mode').innerHTML = [
    { key: 'range', label: 'Range' },
    { key: 'prob', label: 'Prob' },
  ].map(m => `<div class="disc-mode-tab${m.key === discMode ? ' active' : ''}" onclick="setDiscMode('${m.key}')">${m.label}</div>`).join('');

  const thresholds = DISC_THRESHOLDS[discMode] || DISC_THRESHOLDS.prob;
  document.getElementById('disc-tabs').innerHTML = thresholds.map(t => {
    const pct = t * 100;
    const label = (pct < 1 ? pct.toFixed(1) : pct.toFixed(0)) + '%';
    const active = t === discThreshold ? ' active' : '';
    return `<div class="disc-tab${active}" onclick="setDiscThreshold(${t})">${label}</div>`;
  }).join('');
}

function setDiscMode(m) {
  discMode = m;
  const thresholds = DISC_THRESHOLDS[m];
  if (!thresholds.includes(discThreshold)) discThreshold = thresholds[0];
  renderDiscTabs();
  renderErrorLog();
}

function setDiscThreshold(t) {
  discThreshold = t;
  renderDiscTabs();
  renderErrorLog();
}

function renderErrorLog() {
  const data = sportData[activeSport];
  const cfg = SPORTS[activeSport];
  const listEl = document.getElementById('error-log-list');
  const countEl = document.getElementById('error-count');
  renderDiscTabs();
  if (!data) { listEl.innerHTML = '<div class="error-log-empty">Loading...</div>'; countEl.textContent = '0'; return; }

  let html = '';
  let total = 0;

  function discDetail(d) {
    if (d.mode === 'prob') {
      return `OG: <b>${d.ogProb.toFixed(1)}%</b> vs Fair: <b>${d.fairProb.toFixed(1)}%</b>`;
    }
    return `Range: <b>${d.min.toFixed(2)} - ${d.max.toFixed(2)}</b>`;
  }

  if (currentSlug) {
    const discs = findDiscrepancies(currentSlug, cfg, data.grouped);
    total = discs.length;
    if (discs.length === 0) {
      html = '<div class="error-log-empty">No discrepancies for this event</div>';
    } else {
      for (const d of discs) {
        html += `<div class="error-log-item">
          <div class="eli-detail">
            <span class="eli-market">${escHtml(d.type)}</span> &middot; ${escHtml(d.outcome)}<br>
            ${escHtml(d.question)}<br>
            ${discDetail(d)}<br>
            Diff: <span class="eli-range">${d.diff.toFixed(3)} (${(d.pct * 100).toFixed(1)}%)</span>
            ${d.trades > 0 ? `<br>Trades: <span style="color:var(--blue);font-weight:600">${d.trades.toLocaleString()}</span>` : ''}
          </div>
        </div>`;
      }
    }
  } else {
    const events = [...(data.live || []), ...(data.upcoming || []), ...(data.completed || [])];
    const eventDiscs = [];
    for (const ev of events) {
      const discs = findDiscrepancies(ev.slug, cfg, data.grouped);
      if (discs.length > 0) {
        eventDiscs.push({ ev, discs });
      }
    }
    total = eventDiscs.length;
    if (eventDiscs.length === 0) {
      html = '<div class="error-log-empty">No discrepancies found</div>';
    } else {
      for (const { ev, discs } of eventDiscs) {
        const worst = discs.reduce((a, b) => a.pct > b.pct ? a : b);
        const totalTrades = discs.reduce((s, d) => s + d.trades, 0);
        html += `<div class="error-log-item" onclick="openDetail('${ev.slug}')">
          <div class="eli-event">${escHtml(ev.title)}</div>
          <div class="eli-detail">
            ${discs.length} market${discs.length > 1 ? 's' : ''} &middot; worst: <span class="eli-range">${(worst.pct * 100).toFixed(1)}%</span><br>
            <span class="eli-market">${escHtml(worst.type)}</span>: ${discDetail(worst)}
            ${totalTrades > 0 ? `<br>Trades affected: <span style="color:var(--blue);font-weight:600">${totalTrades.toLocaleString()}</span>` : ''}
          </div>
        </div>`;
      }
    }
  }

  countEl.textContent = total;
  listEl.innerHTML = html;
}

// ---- Sorting ----
let sortState = {}; // tableId -> { col, dir }

function sortTable(tableId, colKey, colType) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const tbody = table.querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr'));

  // Group rows in pairs (outcome 1 + outcome 2)
  const groups = [];
  let i = 0;
  while (i < rows.length) {
    const g = parseInt(rows[i].dataset.sortGroup);
    const pair = [rows[i]];
    if (i + 1 < rows.length && parseInt(rows[i + 1].dataset.sortGroup) === g) {
      pair.push(rows[i + 1]);
      i += 2;
    } else {
      i++;
    }
    groups.push(pair);
  }

  // Determine sort direction
  const prev = sortState[tableId];
  let dir = 'asc';
  if (prev && prev.col === colKey) {
    dir = prev.dir === 'asc' ? 'desc' : 'asc';
  }
  sortState[tableId] = { col: colKey, dir };

  // Find column index
  const ths = Array.from(table.querySelectorAll('thead th'));
  const colIdx = ths.findIndex(th => th.dataset.col === colKey);
  if (colIdx === -1) return;

  // Update arrow indicators
  ths.forEach(th => {
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = '';
  });
  const activeArrow = ths[colIdx].querySelector('.sort-arrow');
  if (activeArrow) activeArrow.textContent = dir === 'asc' ? ' \u25B2' : ' \u25BC';

  // Extract sort values from the first row of each group
  // For rowspan cells (question, line), they appear in the first row
  groups.sort((a, b) => {
    let valA = getSortVal(a[0], colIdx, colType);
    let valB = getSortVal(b[0], colIdx, colType);

    if (valA == null && valB == null) return 0;
    if (valA == null) return 1;
    if (valB == null) return -1;

    if (colType === 'num') {
      return dir === 'asc' ? valA - valB : valB - valA;
    }
    return dir === 'asc' ? String(valA).localeCompare(String(valB)) : String(valB).localeCompare(String(valA));
  });

  // Re-append rows
  for (const pair of groups) {
    for (const row of pair) {
      tbody.appendChild(row);
    }
  }
}

function getSortVal(row, colIdx, colType) {
  // First row of each pair has all cells (including rowspan cells),
  // so cell index matches column index directly
  const cells = row.querySelectorAll('td');
  const cell = cells[colIdx];
  if (!cell) return null;

  if (colType === 'num') {
    const dv = cell.dataset.val;
    if (dv !== undefined && dv !== '') return parseFloat(dv);
    const text = cell.textContent.replace('%', '').trim();
    const num = parseFloat(text);
    return isNaN(num) ? null : num;
  }
  return cell.textContent.trim();
}

// ---- URL Routing ----
// Routes: #/{sport}, #/{sport}/{slug}
function navigate(sport, slug) {
  const hash = slug ? `#/${sport}/${slug}` : `#/${sport}`;
  if (location.hash !== hash) {
    location.hash = hash;
  } else {
    handleRoute();
  }
}

function parseRoute() {
  const hash = location.hash.replace(/^#\/?/, '');
  const parts = hash.split('/');
  const sport = SPORTS[parts[0]] ? parts[0] : null;
  const slug = parts.slice(1).join('/') || null;
  return { sport, slug };
}

let _routing = false;
async function handleRoute() {
  if (_routing) return;
  _routing = true;
  try {
    const { sport, slug } = parseRoute();
    const key = sport || Object.keys(SPORTS)[0];

    // Load sport data if needed
    if (key !== activeSport || !sportData[key]) {
      if (key !== activeSport) {
        currentSlug = null;
        document.getElementById('detail-view').classList.remove('active');
        document.getElementById('detail-view').innerHTML = '';
      }
      activeSport = key;
      renderTabs();

      if (!sportData[key]) {
        showLoading(true);
        try {
          await loadSport(key);
          renderTabs();
        } catch (err) {
          document.getElementById('match-list-view').innerHTML = `<div class="notice" style="color:var(--red)">Error loading ${SPORTS[key].label}: ${err.message}</div>`;
          document.getElementById('match-list-view').style.display = '';
          showLoading(false);
          return;
        }
        showLoading(false);
      }
      renderMatchList();
    }

    // Detail view — always sync to match the URL
    if (slug && sportData[key]) {
      if (slug !== currentSlug) {
        openDetailDirect(slug);
      }
    } else if (!slug && currentSlug) {
      closeDetailDirect();
    }
  } finally {
    _routing = false;
  }
}

window.addEventListener('hashchange', handleRoute);

// ---- Sport Switching (now goes through router) ----
function switchSport(key) {
  navigate(key, null);
}

function showLoading(show) {
  const el = document.getElementById('loading');
  if (show) {
    el.style.display = '';
    el.innerHTML = skeletonMatchList();
    document.getElementById('match-list-view').style.display = 'none';
  } else {
    el.style.display = 'none';
    document.getElementById('match-list-view').style.display = '';
  }
}

function skeletonMatchList() {
  let cards = '';
  for (let i = 0; i < 8; i++) cards += '<div class="skeleton skel-card"></div>';
  return `<div class="section-header"><div class="skeleton skel-line w40" style="height:18px"></div></div>
    <div class="match-grid">${cards}</div>`;
}

function skeletonDetail() {
  return `<button class="back-btn" onclick="closeDetail()">\u2190 Back to matches</button>
    <div class="skeleton skel-header"></div>
    <div class="skeleton skel-line w40" style="height:16px;margin-bottom:12px"></div>
    <div class="skeleton skel-table"></div>
    <div class="skeleton skel-line w40" style="height:16px;margin-bottom:12px"></div>
    <div class="skeleton skel-table"></div>`;
}

// ---- Init ----
async function init() {
  // Set default hash if none present
  if (!location.hash || location.hash === '#' || location.hash === '#/') {
    history.replaceState(null, '', `#/${Object.keys(SPORTS)[0]}`);
  }

  // Use the single handleRoute path for initial load
  await handleRoute();

  // Lazy-load remaining sports in background for badge counts
  const otherKeys = Object.keys(SPORTS).filter(k => k !== activeSport);
  Promise.allSettled(otherKeys.map(k => loadSport(k))).then(() => renderTabs());
}


init().catch(err => {
  document.getElementById('loading').innerHTML = `<div style="color:var(--red)">Error: ${err.message}</div>`;
  console.error(err);
});
</script>
