<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHL Prediction Dashboard</title>
<style>
  :root {
    --bg: #0a0e17; --card: #111827; --card2: #162033;
    --border: #2a3a5c; --border2: #1a2540;
    --text: #e0e0e0; --muted: #6b7fa3; --dim: #4a6080;
    --blue: #4a9eff; --green: #34d399; --red: #f87171;
    --yellow: #fbbf24; --purple: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: linear-gradient(135deg, #0d1525 0%, #1a2540 100%); border-bottom: 2px solid var(--border); padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
  header h1 { font-size: 26px; font-weight: 700; color: #fff; }
  header h1 b { color: var(--blue); }
  .stats { display: flex; gap: 16px; flex-wrap: wrap; }
  .stat-box { background: rgba(74,158,255,0.08); border: 1px solid rgba(74,158,255,0.2); border-radius: 8px; padding: 8px 16px; text-align: center; }
  .stat-box .num { font-size: 20px; font-weight: 700; color: var(--blue); }
  .stat-box .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #8899bb; }
  main { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }
  h2 { font-size: 18px; margin-bottom: 16px; color: #fff; display: flex; align-items: center; gap: 8px; }
  h2 .badge { background: var(--blue); color: #fff; font-size: 11px; padding: 2px 10px; border-radius: 12px; font-weight: 600; }
  .loading { text-align: center; padding: 60px; color: var(--muted); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Prediction Cards ---- */
  .predictions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 16px; margin-bottom: 40px; }
  .pred-card { background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: border-color .2s; position: relative; z-index: 1; }
  .pred-card:hover { border-color: var(--blue); }
  .pred-card:has(.card-details.open) { z-index: 10; border-color: var(--blue); border-radius: 12px 12px 0 0; }
  .card-details { display: none; }
  .card-details.open { display: block; position: absolute; left: 0; right: 0; top: 100%; background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%); border: 1px solid var(--blue); border-top: none; border-radius: 0 0 12px 12px; padding: 18px; z-index: 10; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .card-header .datetime { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .card-header .conf-badge { font-size: 13px; font-weight: 700; padding: 4px 12px; border-radius: 6px; color: #fff; }

  .matchup { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .team { flex: 1; text-align: center; }
  .team .name { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .team .record { font-size: 12px; color: var(--muted); }
  .team.winner .name { color: var(--green); }
  .vs { font-size: 12px; font-weight: 700; color: #3a4a6c; padding: 0 10px; }

  /* Market odds grid */
  .odds-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .odds-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border2); border-radius: 8px; padding: 8px; }
  .odds-box .odds-title { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--yellow); font-weight: 600; margin-bottom: 6px; text-align: center; }
  .odds-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 3px; }
  .odds-row .odds-team { color: var(--text); max-width: 55%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .odds-row .odds-val { font-weight: 600; }
  .odds-fav { color: var(--green); }
  .odds-dog { color: var(--red); }
  .odds-pick { color: var(--green); font-weight: 700; background: rgba(52,211,153,0.12); padding: 1px 6px; border-radius: 4px; }
  .odds-line { text-align: center; font-size: 11px; color: var(--yellow); font-weight: 600; margin-bottom: 2px; }
  .odds-na { color: var(--dim); font-style: italic; }

  /* Expand / collapse */
  .expand-btn {
    width: 100%; background: none; border: 1px solid var(--border2); border-radius: 6px;
    color: var(--muted); font-size: 11px; padding: 6px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 1px; transition: all .2s; margin-top: 8px;
  }
  .expand-btn:hover { color: var(--blue); border-color: var(--blue); }

  /* Signal breakdown */
  .signals { border-top: 1px solid var(--border2); padding-top: 10px; margin-bottom: 10px; }
  .sig-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .sig-label { width: 70px; flex-shrink: 0; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .sig-bar-wrap { flex: 1; display: flex; align-items: center; gap: 5px; }
  .sig-pct { width: 30px; text-align: right; font-weight: 700; font-size: 11px; }
  .sig-pct.t1 { color: var(--green); }
  .sig-pct.t2 { color: var(--blue); }
  .sig-bar-bg { flex: 1; height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; display: flex; }
  .sig-bar-t1 { height: 100%; background: var(--green); border-radius: 3px 0 0 3px; }
  .sig-bar-t2 { height: 100%; background: var(--blue); border-radius: 0 3px 3px 0; margin-left: auto; }
  .sig-detail { font-size: 9px; color: var(--dim); width: 80px; text-align: center; flex-shrink: 0; }

  /* H2H + scoring deep dive */
  .deep-dive { border-top: 1px solid var(--border2); padding-top: 10px; margin-bottom: 10px; }
  .dd-section { margin-bottom: 8px; }
  .dd-title { font-size: 9px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 4px; }
  .dd-row { display: flex; gap: 12px; font-size: 12px; flex-wrap: wrap; }
  .dd-stat { background: rgba(255,255,255,0.03); border-radius: 4px; padding: 3px 8px; }
  .dd-stat span { color: var(--muted); font-size: 10px; }
  .dd-stat strong { color: #fff; }
  .h2h-game { font-size: 11px; color: var(--muted); padding: 2px 0; }
  .h2h-game .h2h-score { color: #fff; font-weight: 600; }
  .h2h-game .h2h-winner { color: var(--green); }

  /* Overall confidence bar */
  .conf-section { padding-top: 8px; }
  .conf-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .conf-header .predicted { color: var(--green); font-weight: 700; }
  .conf-header .pct { font-weight: 700; color: #fff; font-size: 15px; }
  .conf-bar-bg { height: 10px; background: var(--border2); border-radius: 5px; overflow: hidden; }
  .conf-bar { height: 100%; border-radius: 5px; }

  /* Prediction tracker */
  .tracker-table { width: 100%; border-collapse: collapse; }
  .tracker-table th { text-align: left; padding: 10px 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 2px solid var(--border); background: #0d1525; position: sticky; top: 0; z-index: 1; }
  .tracker-table td { padding: 8px 12px; border-bottom: 1px solid var(--border2); font-size: 12px; }
  .tracker-table tr:hover td { background: rgba(74,158,255,0.03); }
  .tracker-stats { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .tracker-stat { background: rgba(255,255,255,0.03); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 16px; text-align: center; }
  .tracker-stat .num { font-size: 18px; font-weight: 700; }
  .tracker-stat .label { font-size: 10px; text-transform: uppercase; color: var(--muted); }

  /* ---- Results Table ---- */
  .results-table { width: 100%; border-collapse: collapse; }
  .results-table th { text-align: left; padding: 10px 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 2px solid var(--border); background: #0d1525; position: sticky; top: 0; z-index: 1; }
  .results-table td { padding: 8px 12px; border-bottom: 1px solid var(--border2); font-size: 12px; }
  .results-table tr:hover td { background: rgba(74,158,255,0.03); }
  .score-cell { font-weight: 700; color: #fff; }
  .result-correct { color: var(--green); font-weight: 600; }
  .result-incorrect { color: var(--red); font-weight: 600; }
  .result-na { color: var(--muted); }
  .table-wrapper { max-height: 600px; overflow-y: auto; border: 1px solid var(--border); border-radius: 12px; }
  .table-wrapper::-webkit-scrollbar { width: 6px; }
  .table-wrapper::-webkit-scrollbar-track { background: #0d1525; }
  .table-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; display: inline-block; margin: 1px 2px; }
  .tag-spread { background: rgba(52,211,153,0.1); color: var(--green); }
  .tag-total { background: rgba(251,191,36,0.1); color: var(--yellow); }
  .tag-ml { background: rgba(74,158,255,0.1); color: var(--blue); }
  .tag-dim { opacity: 0.4; }
</style>
</head>
<body>

<header>
  <h1><b>NHL</b> Prediction Dashboard</h1>
  <div class="stats">
    <div class="stat-box"><div class="num" id="s-games">-</div><div class="label">Games Analyzed</div></div>
    <div class="stat-box"><div class="num" id="s-preds">-</div><div class="label">Predictions</div></div>
    <div class="stat-box"><div class="num" id="s-mkts">-</div><div class="label">Total Markets</div></div>
    <div class="stat-box"><div class="num" id="s-favwr">-</div><div class="label">ML Fav Win%</div></div>
  </div>
</header>

<main>
  <div id="loading" class="loading"><div class="spinner"></div><div id="load-msg">Loading NHL data...</div></div>
  <div id="content" style="display:none">
    <h2>Upcoming Predictions <span class="badge" id="pred-count">0</span></h2>
    <div class="predictions-grid" id="pred-grid"></div>
    <h2>Prediction Tracker <span class="badge" id="tracker-count">0</span></h2>
    <div id="tracker-section"></div>
    <h2 style="margin-top:32px">Recent Results <span class="badge" id="res-count">0</span></h2>
    <div class="table-wrapper">
      <table class="results-table">
        <thead><tr>
          <th>Date</th><th>Matchup</th><th>Score</th>
          <th>ML Fav</th><th>ML Odds</th>
          <th>Spread</th><th>Spread Odds</th>
          <th>Total</th><th>Total Odds</th>
          <th>Result</th>
        </tr></thead>
        <tbody id="res-body"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const SB_URL = 'https://ugvwiyhdyqekahizwuhg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVndndpeWhkeXFla2FoaXp3dWhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwMTcyNzAsImV4cCI6MjA4NDU5MzI3MH0.vf4FlW327rHxApBV2NtDvw_EUAHmymp-msU8HxkQuIo';

const msg = t => { const e = document.getElementById('load-msg'); if (e) e.textContent = t; };

async function q(table, params = '', range = null) {
  const headers = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };
  if (range) headers.Range = range;
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers });
  if (!r.ok) throw new Error(`API ${r.status}`);
  return r.json();
}

async function qAll(table, params = '') {
  const PG = 1000; let all = [], off = 0;
  while (true) {
    const page = await q(table, params, `${off}-${off + PG - 1}`);
    all = all.concat(page);
    if (page.length < PG) break;
    off += PG;
    msg(`Loading markets... ${all.length}`);
  }
  return all;
}

function parseTitle(t) {
  const m = t.match(/^(.+?)\s+vs\.?\s+(.+?)$/i);
  return m ? [m[1].trim(), m[2].trim()] : [t, 'Unknown'];
}
function parseScore(s) {
  if (!s) return null;
  const m = s.match(/(\d+)\s*[-–]\s*(\d+)/);
  return m ? [parseInt(m[1]), parseInt(m[2])] : null;
}
function spTeam(n) { if (!n) return null; const m = n.match(/^(.+?)\s+[+-][\d.]+$/); return m ? m[1].trim() : null; }
function spVal(n) { if (!n) return 0; const m = n.match(/([+-][\d.]+)$/); return m ? parseFloat(m[1]) : 0; }
function totalLine(n) { if (!n) return null; const m = n.match(/([\d.]+)$/); return m ? parseFloat(m[1]) : null; }
function prob(o) { return (o && o > 1) ? 1 / o : null; }
function fmtOdds(o) { return o ? o.toFixed(2) : '-'; }
function pct(v) { return Math.round(v * 100); }
function fmtDate(u) {
  if (!u) return 'TBD';
  const d = new Date(u);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
    + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
function confGrad(p) {
  if (p >= 70) return 'linear-gradient(90deg, #34d399, #059669)';
  if (p >= 60) return 'linear-gradient(90deg, #4a9eff, #2563eb)';
  if (p >= 55) return 'linear-gradient(90deg, #fbbf24, #d97706)';
  return 'linear-gradient(90deg, #9ca3af, #6b7280)';
}
function confBg(p) {
  if (p >= 70) return 'rgba(52,211,153,0.2)';
  if (p >= 60) return 'rgba(74,158,255,0.2)';
  if (p >= 55) return 'rgba(251,191,36,0.2)';
  return 'rgba(156,163,175,0.15)';
}

// Best odds: prefer current_odds, fall back to pinn_odds
function bestOdds1(m) { return m.outcome_1_current_odds || m.outcome_1_pinn_odds; }
function bestOdds2(m) { return m.outcome_2_current_odds || m.outcome_2_pinn_odds; }

async function main() {
  try {
    msg('Loading events...');
    const [completed, upcoming] = await Promise.all([
      q('nhl_events', 'select=slug,title,start_time_utc,score&score=not.is.null&order=start_time_utc.desc&limit=1000'),
      q('nhl_events', 'select=slug,title,start_time_utc,score&score=is.null&order=start_time_utc.asc&limit=200'),
    ]);

    msg('Loading all markets...');
    const allMkts = await qAll('nhl_markets',
      'select=event_slug,sports_market_type,line,outcome_1_name,outcome_1_pinn_odds,outcome_1_current_odds,outcome_2_name,outcome_2_pinn_odds,outcome_2_current_odds,winning_outcome'
    );

    msg('Crunching numbers...');

    // Group: slug -> { moneyline:[], spreads:[], totals:[] }
    const M = {};
    for (const m of allMkts) {
      if (!M[m.event_slug]) M[m.event_slug] = { moneyline: [], spreads: [], totals: [] };
      (M[m.event_slug][m.sports_market_type] || []).push(m);
    }

    // All events indexed by slug
    const allEvents = [...completed, ...upcoming];
    const evBySlug = {};
    for (const e of allEvents) evBySlug[e.slug] = e;

    // ---- Team stats ----
    const tw = {}, tg = {}, tsc = {}, tsg = {}, tgf = {}, tgc = {};
    // H2H: key "TeamA|TeamB" (sorted) -> [{date, score, winner, t1, t2, g1, g2}]
    const h2h = {};
    // Per-team recent form: team -> [{date, opponent, goalsFor, goalsAgainst, won, mlOdds}]
    const form = {};

    function inc(o, k, v = 1) { o[k] = (o[k] || 0) + v; }

    let favW = 0, favT = 0;

    for (const ev of completed) {
      const mk = M[ev.slug]; if (!mk) continue;
      const [t1, t2] = parseTitle(ev.title);
      const sc = parseScore(ev.score);

      // Goals
      if (sc && t1 !== 'Unknown') {
        inc(tgf, t1, sc[0]); inc(tgc, t1);
        inc(tgf, t2, sc[1]); inc(tgc, t2);

        // Determine winner from score
        const scoreWinner = sc[0] > sc[1] ? t1 : sc[1] > sc[0] ? t2 : null;

        // H2H
        const hk = [t1, t2].sort().join('|');
        if (!h2h[hk]) h2h[hk] = [];
        h2h[hk].push({ date: ev.start_time_utc, score: ev.score, winner: scoreWinner, t1, t2, g1: sc[0], g2: sc[1] });

        // Per-team form
        const mlM = mk.moneyline.find(m => bestOdds1(m) || bestOdds2(m)) || mk.moneyline[0];
        const mlOddsT1 = mlM ? bestOdds1(mlM) : null;
        const mlOddsT2 = mlM ? bestOdds2(mlM) : null;

        if (!form[t1]) form[t1] = [];
        form[t1].push({ date: ev.start_time_utc, opp: t2, gf: sc[0], ga: sc[1], won: scoreWinner === t1, mlOdds: mlOddsT1 });
        if (!form[t2]) form[t2] = [];
        form[t2].push({ date: ev.start_time_utc, opp: t1, gf: sc[1], ga: sc[0], won: scoreWinner === t2, mlOdds: mlOddsT2 });
      }

      // ML W/L
      for (const ml of mk.moneyline) {
        if (!ml.winning_outcome) continue;
        const w = ml.winning_outcome.trim();
        const a = ml.outcome_1_name?.trim(), b = ml.outcome_2_name?.trim();
        if (a) { inc(tg, a); if (w === a) inc(tw, a); }
        if (b) { inc(tg, b); if (w === b) inc(tw, b); }
        const p1 = prob(bestOdds1(ml)), p2 = prob(bestOdds2(ml));
        if (p1 && p2 && p1 !== p2) { favT++; if ((p1 > p2 ? a : b) === w) favW++; }
      }

      // Spread ATS
      for (const sp of mk.spreads) {
        if (!sp.winning_outcome) continue;
        const w = sp.winning_outcome.trim();
        const a = spTeam(sp.outcome_1_name), b = spTeam(sp.outcome_2_name);
        if (a) { inc(tsg, a); if (w === a) inc(tsc, a); }
        if (b) { inc(tsg, b); if (w === b) inc(tsc, b); }
      }
    }

    const wr = t => tg[t] ? (tw[t] || 0) / tg[t] : .5;
    const ats = t => tsg[t] ? (tsc[t] || 0) / tsg[t] : .5;
    const gpg = t => tgc[t] ? tgf[t] / tgc[t] : null;
    const gapg = t => { // goals against per game
      const f = form[t]; if (!f || !f.length) return null;
      return f.reduce((s, g) => s + g.ga, 0) / f.length;
    };

    // Recent form (last 10)
    const recentForm = t => {
      const f = form[t]; if (!f) return [];
      return f.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 10);
    };
    const last10wr = t => {
      const r = recentForm(t); if (!r.length) return null;
      return r.filter(g => g.won).length / r.length;
    };
    const last10gpg = t => {
      const r = recentForm(t); if (!r.length) return null;
      return r.reduce((s, g) => s + g.gf, 0) / r.length;
    };

    // ---- Build predictions ----
    const predictions = [];
    for (const ev of upcoming) {
      const mk = M[ev.slug]; if (!mk) continue;
      const ml = mk.moneyline[0]; if (!ml) continue;
      const t1 = ml.outcome_1_name?.trim(), t2 = ml.outcome_2_name?.trim();
      if (!t1 || !t2) continue;

      // Get best available odds for each market type
      const mlO1 = bestOdds1(ml), mlO2 = bestOdds2(ml);
      const mlP1 = prob(mlO1), mlP2 = prob(mlO2);
      const hasML = mlP1 && mlP2;
      let mlC1 = .5, mlC2 = .5;
      if (hasML) { const s = mlP1 + mlP2; mlC1 = mlP1 / s; mlC2 = mlP2 / s; }

      // Win rate
      const w1 = wr(t1), w2 = wr(t2), ws = w1 + w2 || 1;
      const wrC1 = w1 / ws, wrC2 = w2 / ws;

      // Spread
      let spC1 = .5, spC2 = .5, spDisp = null, spO1 = null, spO2 = null, spLine = null;
      const spBest = mk.spreads.find(s => bestOdds1(s) && bestOdds2(s)) || mk.spreads[0];
      if (spBest) {
        spDisp = spBest.outcome_1_name;
        spO1 = bestOdds1(spBest); spO2 = bestOdds2(spBest);
        spLine = spBest.line;
        const st1 = spTeam(spBest.outcome_1_name);
        const sv1 = spVal(spBest.outcome_1_name);
        if (st1 === t1) {
          spC1 = sv1 < 0 ? .5 + Math.min(Math.abs(sv1) * .12, .2) : .5 - Math.min(sv1 * .12, .2);
          spC2 = 1 - spC1;
        } else if (st1 === t2) {
          spC2 = sv1 < 0 ? .5 + Math.min(Math.abs(sv1) * .12, .2) : .5 - Math.min(sv1 * .12, .2);
          spC1 = 1 - spC2;
        }
      } else {
        const a1 = ats(t1), a2 = ats(t2), as = a1 + a2 || 1;
        spC1 = a1 / as; spC2 = a2 / as;
      }

      // Totals - collect all lines, predict over/under for each
      const expectedTotal = (gpg(t1) || 0) + (gpg(t2) || 0);
      const totals = mk.totals.map(t => {
        const line = totalLine(t.outcome_1_name) || t.line;
        // Predict: if combined GPG > line, lean over; else under
        const predictOver = expectedTotal > (line || 0);
        return {
          line, o1: bestOdds1(t), o2: bestOdds2(t),
          name1: t.outcome_1_name, name2: t.outcome_2_name,
          predictOver,
        };
      }).sort((a, b) => (a.line || 0) - (b.line || 0));

      // Scoring signal
      const g1 = gpg(t1), g2 = gpg(t2);
      let scC1 = .5, scC2 = .5;
      if (g1 != null && g2 != null) { const s = g1 + g2 || 1; scC1 = g1 / s; scC2 = g2 / s; }

      // Recent form signal (last 10)
      const l10_1 = last10wr(t1), l10_2 = last10wr(t2);
      let fmC1 = .5, fmC2 = .5;
      if (l10_1 != null && l10_2 != null) { const s = l10_1 + l10_2 || 1; fmC1 = l10_1 / s; fmC2 = l10_2 / s; }

      // H2H signal
      const hk = [t1, t2].sort().join('|');
      const h2hGames = (h2h[hk] || []).sort((a, b) => new Date(b.date) - new Date(a.date));
      let h2hC1 = .5, h2hC2 = .5;
      if (h2hGames.length > 0) {
        const w1h = h2hGames.filter(g => g.winner === t1).length;
        const w2h = h2hGames.filter(g => g.winner === t2).length;
        const s = w1h + w2h || 1;
        h2hC1 = w1h / s; h2hC2 = w2h / s;
      }

      // Weighted blend - adaptive
      let wML, wWR, wSP, wSC, wFM, wH2H;
      if (hasML) {
        wML = .35; wWR = .15; wSP = .12; wSC = .08; wFM = .18; wH2H = .12;
      } else {
        wML = 0; wWR = .28; wSP = .15; wSC = .12; wFM = .25; wH2H = .20;
      }

      const b1 = wML*mlC1 + wWR*wrC1 + wSP*spC1 + wSC*scC1 + wFM*fmC1 + wH2H*h2hC1;
      const b2 = wML*mlC2 + wWR*wrC2 + wSP*spC2 + wSC*scC2 + wFM*fmC2 + wH2H*h2hC2;
      const n = b1 + b2 || 1;
      const f1 = b1 / n, f2 = b2 / n;
      const winner = f1 >= f2 ? t1 : t2;
      const conf = Math.round(Math.max(f1, f2) * 100);

      predictions.push({
        title: ev.title, date: ev.start_time_utc, t1, t2,
        mlO1, mlO2, mlC1, mlC2, hasML,
        wr1: wr(t1), wr2: wr(t2), gp1: tg[t1]||0, gp2: tg[t2]||0, wrC1, wrC2,
        spDisp, spDisp2: spBest ? spBest.outcome_2_name : null, spO1, spO2, spLine, spC1, spC2,
        ats1: ats(t1), ats2: ats(t2),
        totals,
        g1, g2, ga1: gapg(t1), ga2: gapg(t2), scC1, scC2,
        l10_1, l10_2, l10g1: last10gpg(t1), l10g2: last10gpg(t2), fmC1, fmC2,
        h2hGames, h2hC1, h2hC2,
        recentT1: recentForm(t1).slice(0, 5), recentT2: recentForm(t2).slice(0, 5),
        winner, conf,
      });
    }

    // ---- Render ----
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = '';
    document.getElementById('s-games').textContent = completed.length;
    document.getElementById('s-preds').textContent = predictions.length;
    document.getElementById('s-mkts').textContent = allMkts.length.toLocaleString();
    document.getElementById('s-favwr').textContent = favT ? pct(favW / favT) + '%' : '-';
    document.getElementById('pred-count').textContent = predictions.length;
    document.getElementById('res-count').textContent = Math.min(completed.length, 200);

    // ---- Prediction cards ----
    const grid = document.getElementById('pred-grid');
    let html = '';
    for (let i = 0; i < predictions.length; i++) {
      const p = predictions[i];
      const isT1 = p.winner === p.t1;

      const sigBar = (lbl, c1, c2, detail) => {
        const v1 = pct(c1), v2 = pct(c2);
        return `<div class="sig-row">
          <div class="sig-label">${lbl}</div>
          <div class="sig-bar-wrap">
            <span class="sig-pct t1">${v1}%</span>
            <div class="sig-bar-bg">
              <div class="sig-bar-t1" style="width:${v1}%"></div>
              <div class="sig-bar-t2" style="width:${v2}%"></div>
            </div>
            <span class="sig-pct t2">${v2}%</span>
          </div>
          <div class="sig-detail">${detail}</div>
        </div>`;
      };

      // Moneyline: highlight predicted winner green
      const mlHtml = (() => {
        if (!p.mlO1 && !p.mlO2) return `<div class="odds-row"><span class="odds-na">No odds yet</span></div>`;
        const pick1 = p.winner === p.t1;
        return `<div class="odds-row">
          <span class="odds-team">${p.t1}</span>
          <span class="odds-val ${pick1 ? 'odds-pick' : ''}">${fmtOdds(p.mlO1)}</span>
        </div>
        <div class="odds-row">
          <span class="odds-team">${p.t2}</span>
          <span class="odds-val ${!pick1 ? 'odds-pick' : ''}">${fmtOdds(p.mlO2)}</span>
        </div>`;
      })();

      // Totals display — separate box per line, title is "Total 5.5" in yellow
      let totalsBoxes = '';
      if (p.totals.length > 0) {
        for (const t of p.totals) {
          let inner = `<div class="odds-row"><span class="odds-team">Over</span><span class="odds-val ${t.predictOver ? 'odds-pick' : ''}">${t.o1 ? fmtOdds(t.o1) : '-'}</span></div>`;
          inner += `<div class="odds-row"><span class="odds-team">Under</span><span class="odds-val ${!t.predictOver ? 'odds-pick' : ''}">${t.o2 ? fmtOdds(t.o2) : '-'}</span></div>`;
          totalsBoxes += `<div class="odds-box"><div class="odds-title odds-title-yellow">Total ${t.line}</div>${inner}</div>`;
        }
      }

      // H2H history
      let h2hHtml = '';
      if (p.h2hGames.length > 0) {
        for (const g of p.h2hGames.slice(0, 4)) {
          const d = new Date(g.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          h2hHtml += `<div class="h2h-game">${d}: ${g.t1} <span class="h2h-score">${g.g1}-${g.g2}</span> ${g.t2} ${g.winner ? `<span class="h2h-winner">${g.winner} W</span>` : ''}</div>`;
        }
      } else {
        h2hHtml = `<div class="h2h-game">No previous matchups</div>`;
      }

      // Recent form mini-table
      const formRow = (games, team) => {
        if (!games.length) return '<span class="odds-na">No data</span>';
        return games.map(g => {
          const cls = g.won ? 'odds-fav' : 'odds-dog';
          return `<span class="${cls}" style="font-size:10px">${g.won ? 'W' : 'L'} ${g.gf}-${g.ga} vs ${g.opp}${g.mlOdds ? ' @' + fmtOdds(g.mlOdds) : ''}</span>`;
        }).join('<br>');
      };

      const f = v => v != null ? v.toFixed(1) : '-';
      const fp = v => v != null ? pct(v) + '%' : '-';

      const cardId = 'card-' + i;
      html += `
      <div class="pred-card">
        <div class="card-header">
          <div class="datetime">${fmtDate(p.date)}</div>
          <div class="conf-badge" style="background:${confBg(p.conf)}">${p.conf}%</div>
        </div>

        <div class="matchup">
          <div class="team ${isT1 ? 'winner' : ''}">
            <div class="name">${p.t1}</div>
            <div class="record">${p.gp1}GP · ${(tw[p.t1]||0)}W-${(p.gp1-(tw[p.t1]||0))}L · ${pct(p.wr1)}%</div>
          </div>
          <div class="vs">VS</div>
          <div class="team ${!isT1 ? 'winner' : ''}">
            <div class="name">${p.t2}</div>
            <div class="record">${p.gp2}GP · ${(tw[p.t2]||0)}W-${(p.gp2-(tw[p.t2]||0))}L · ${pct(p.wr2)}%</div>
          </div>
        </div>

        <div class="odds-grid">
          <div class="odds-box">
            <div class="odds-title">Moneyline</div>
            ${mlHtml}
          </div>
          ${p.spDisp ? `<div class="odds-box">
            <div class="odds-title">Spread ${p.spLine || ''}</div>
            <div class="odds-row"><span class="odds-team">${p.spDisp}</span><span class="odds-val ${p.spC1 > p.spC2 ? 'odds-pick' : ''}">${fmtOdds(p.spO1)}</span></div>
            <div class="odds-row"><span class="odds-team">${p.spDisp2 || ''}</span><span class="odds-val ${p.spC2 > p.spC1 ? 'odds-pick' : ''}">${fmtOdds(p.spO2)}</span></div>
          </div>` : ''}
          ${totalsBoxes}
        </div>

        <div class="conf-section">
          <div class="conf-header">
            <span class="predicted">${p.winner}</span>
            <span class="pct">${p.conf}%</span>
          </div>
          <div class="conf-bar-bg"><div class="conf-bar" style="width:${p.conf}%;background:${confGrad(p.conf)}"></div></div>
        </div>

        <button class="expand-btn" onclick="toggleCard('${cardId}', this)">Show Analysis</button>
        <div class="card-details" id="${cardId}">
          <div class="signals">
            ${sigBar('ML Odds', p.mlC1, p.mlC2, p.hasML ? fmtOdds(p.mlO1)+' / '+fmtOdds(p.mlO2) : 'No odds')}
            ${sigBar('Win Rate', p.wrC1, p.wrC2, pct(p.wr1)+'% / '+pct(p.wr2)+'%')}
            ${sigBar('Form L10', p.fmC1, p.fmC2, fp(p.l10_1)+' / '+fp(p.l10_2))}
            ${sigBar('Spread', p.spC1, p.spC2, 'ATS '+pct(p.ats1)+'% / '+pct(p.ats2)+'%')}
            ${sigBar('Scoring', p.scC1, p.scC2, f(p.g1)+' / '+f(p.g2)+' GPG')}
            ${sigBar('H2H', p.h2hC1, p.h2hC2, p.h2hGames.length+' games')}
          </div>
          <div class="deep-dive">
            <div class="dd-section">
              <div class="dd-title">Scoring Profile</div>
              <div class="dd-row">
                <div class="dd-stat"><span>${p.t1} GF/G:</span> <strong>${f(p.g1)}</strong></div>
                <div class="dd-stat"><span>${p.t1} GA/G:</span> <strong>${f(p.ga1)}</strong></div>
                <div class="dd-stat"><span>${p.t2} GF/G:</span> <strong>${f(p.g2)}</strong></div>
                <div class="dd-stat"><span>${p.t2} GA/G:</span> <strong>${f(p.ga2)}</strong></div>
                <div class="dd-stat"><span>L10 GPG:</span> <strong>${f(p.l10g1)} / ${f(p.l10g2)}</strong></div>
              </div>
            </div>
            <div class="dd-section">
              <div class="dd-title">Head-to-Head (${p.h2hGames.length})</div>
              ${h2hHtml}
            </div>
            <div class="dd-section" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <div>
                <div class="dd-title">${p.t1} Last 5</div>
                ${formRow(p.recentT1, p.t1)}
              </div>
              <div>
                <div class="dd-title">${p.t2} Last 5</div>
                ${formRow(p.recentT2, p.t2)}
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }
    grid.innerHTML = html;

    // ---- Prediction Tracker: save to localStorage & check results ----
    const STORAGE_KEY = 'nhl_pred_tracker';
    let tracker = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

    // Clear any previously incorrect resolutions (from old matching logic)
    for (const key of Object.keys(tracker)) {
      const t = tracker[key];
      // If this prediction's date is still in the future, it can't have a result yet
      if (t.result && new Date(t.date) > new Date()) {
        t.result = null;
      }
    }

    // Save current predictions
    for (const p of predictions) {
      const key = p.title + '|' + p.date;
      if (!tracker[key]) {
        tracker[key] = {
          date: p.date, t1: p.t1, t2: p.t2, title: p.title,
          predictedWinner: p.winner, confidence: p.conf,
          totalPicks: p.totals.map(t => ({ line: t.line, pickOver: t.predictOver })),
          savedAt: new Date().toISOString(),
          result: null,
        };
      }
    }

    // Check completed events against saved predictions — match by date to avoid false matches
    const completedByKey = {};
    for (const ev of completed) {
      completedByKey[ev.title + '|' + ev.start_time_utc] = ev;
    }
    for (const key of Object.keys(tracker)) {
      const t = tracker[key];
      if (t.result) continue; // already resolved
      // Only resolve if this exact game (same title + date) now has a score
      const ev = completedByKey[t.title + '|' + t.date];
      if (!ev || !ev.score) continue;
      const sc = parseScore(ev.score);
      if (!sc) continue;
      const [tt1, tt2] = parseTitle(ev.title);
      const actualWinner = sc[0] > sc[1] ? tt1 : sc[1] > sc[0] ? tt2 : 'Draw';
      const actualTotal = sc[0] + sc[1];
      t.result = {
        score: ev.score,
        actualWinner,
        mlCorrect: t.predictedWinner === actualWinner,
        totalResults: (t.totalPicks || []).map(tp => ({
          line: tp.line,
          pickOver: tp.pickOver,
          actual: actualTotal > tp.line ? 'Over' : actualTotal < tp.line ? 'Under' : 'Push',
          correct: tp.pickOver ? actualTotal > tp.line : actualTotal < tp.line,
        })),
      };
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tracker));

    // Render tracker
    const trackerEntries = Object.values(tracker).sort((a, b) => new Date(b.date) - new Date(a.date));
    const resolved = trackerEntries.filter(t => t.result);
    const mlWins = resolved.filter(t => t.result.mlCorrect).length;
    const totalPicks = resolved.flatMap(t => t.result.totalResults || []);
    const totalWins = totalPicks.filter(t => t.correct).length;

    document.getElementById('tracker-count').textContent = trackerEntries.length;

    let trackerHtml = '';
    if (trackerEntries.length > 0) {
      trackerHtml += `<div class="tracker-stats">
        <div class="tracker-stat"><div class="num" style="color:var(--blue)">${trackerEntries.length}</div><div class="label">Tracked</div></div>
        <div class="tracker-stat"><div class="num" style="color:var(--green)">${resolved.length}</div><div class="label">Resolved</div></div>
        <div class="tracker-stat"><div class="num" style="color:${mlWins/resolved.length>=.5?'var(--green)':'var(--red)'}">${resolved.length ? pct(mlWins/resolved.length)+'%' : '-'}</div><div class="label">ML Pick Accuracy</div></div>
        <div class="tracker-stat"><div class="num" style="color:${totalPicks.length&&totalWins/totalPicks.length>=.5?'var(--green)':'var(--red)'}">${totalPicks.length ? pct(totalWins/totalPicks.length)+'%' : '-'}</div><div class="label">Totals Accuracy</div></div>
        <div class="tracker-stat"><div class="num" style="color:var(--muted)">${mlWins}/${resolved.length}</div><div class="label">ML W/L</div></div>
        <div class="tracker-stat"><div class="num" style="color:var(--muted)">${totalWins}/${totalPicks.length}</div><div class="label">Totals W/L</div></div>
      </div>`;
      trackerHtml += `<div class="table-wrapper" style="max-height:400px"><table class="tracker-table"><thead><tr>
        <th>Date</th><th>Matchup</th><th>Pick</th><th>Conf</th><th>Score</th><th>ML Result</th><th>Totals Results</th>
      </tr></thead><tbody>`;
      for (const t of trackerEntries) {
        const r = t.result;
        let mlRes = '<span class="result-na">Pending</span>';
        let totRes = '<span class="result-na">Pending</span>';
        if (r) {
          mlRes = r.mlCorrect
            ? `<span class="result-correct">Correct</span>`
            : `<span class="result-incorrect">Wrong (${r.actualWinner})</span>`;
          if (r.totalResults && r.totalResults.length) {
            totRes = r.totalResults.map(tr =>
              `<span class="${tr.correct ? 'result-correct' : 'result-incorrect'}">${tr.pickOver ? 'O' : 'U'} ${tr.line} ${tr.correct ? 'Y' : 'N'}</span>`
            ).join(' ');
          }
        }
        trackerHtml += `<tr>
          <td>${fmtDate(t.date)}</td>
          <td>${t.t1} vs ${t.t2}</td>
          <td style="color:var(--green);font-weight:600">${t.predictedWinner}</td>
          <td>${t.confidence}%</td>
          <td class="score-cell">${r ? r.score : '-'}</td>
          <td>${mlRes}</td>
          <td>${totRes}</td>
        </tr>`;
      }
      trackerHtml += `</tbody></table></div>`;
    } else {
      trackerHtml = `<div style="color:var(--muted);padding:16px">Predictions will be tracked here as games are played.</div>`;
    }
    document.getElementById('tracker-section').innerHTML = trackerHtml;

    // ---- Results table ----
    const tbody = document.getElementById('res-body');
    let rhtml = '';
    for (const ev of completed.slice(0, 200)) {
      const mk = M[ev.slug];
      let favName = '-', resClass = 'result-na', resText = '-';
      let mlOddsStr = '-', spCell = '-', spOddsStr = '-', totCell = '-', totOddsStr = '-';

      if (mk) {
        // ML
        const ml = mk.moneyline.find(m => bestOdds1(m) || bestOdds2(m)) || mk.moneyline[0];
        if (ml) {
          const o1 = bestOdds1(ml), o2 = bestOdds2(ml);
          const p1 = prob(o1), p2 = prob(o2);
          if (p1 && p2) {
            favName = p1 > p2 ? ml.outcome_1_name : ml.outcome_2_name;
            mlOddsStr = `<span class="tag tag-ml">${fmtOdds(o1)} / ${fmtOdds(o2)}</span>`;
          } else if (ml.winning_outcome) {
            favName = ml.winning_outcome.trim();
          }
          if (ml.winning_outcome) {
            if (p1 && p2) {
              const favWon = ml.winning_outcome.trim() === favName.trim();
              resClass = favWon ? 'result-correct' : 'result-incorrect';
              resText = favWon ? 'Fav Won' : 'Upset';
            } else {
              resText = ml.winning_outcome.trim();
              resClass = 'result-correct';
            }
          }
        }

        // Spread
        const sp = mk.spreads.find(s => s.winning_outcome) || mk.spreads[0];
        if (sp) {
          const st = spTeam(sp.outcome_1_name);
          const sv = spVal(sp.outcome_1_name);
          const o1 = bestOdds1(sp), o2 = bestOdds2(sp);
          spCell = `<span class="tag tag-spread">${st} ${sv > 0 ? '+' : ''}${sv}</span>`;
          if (sp.winning_outcome) {
            spCell += ` <span style="color:var(--green);font-size:10px">${sp.winning_outcome}</span>`;
          }
          if (o1 || o2) spOddsStr = `<span class="tag tag-spread">${fmtOdds(o1)} / ${fmtOdds(o2)}</span>`;
        }

        // Total
        const tot = mk.totals.find(t => t.winning_outcome) || mk.totals[0];
        if (tot) {
          const tl = totalLine(tot.outcome_1_name) || tot.line;
          const o1 = bestOdds1(tot), o2 = bestOdds2(tot);
          totCell = `<span class="tag tag-total">O/U ${tl || '?'}</span>`;
          if (tot.winning_outcome) {
            totCell += ` <span style="color:var(--yellow);font-size:10px">${tot.winning_outcome}</span>`;
          }
          if (o1 || o2) totOddsStr = `<span class="tag tag-total">${fmtOdds(o1)} / ${fmtOdds(o2)}</span>`;
        }
      }

      rhtml += `<tr>
        <td>${fmtDate(ev.start_time_utc)}</td>
        <td>${ev.title}</td>
        <td class="score-cell">${ev.score}</td>
        <td>${favName}</td>
        <td>${mlOddsStr}</td>
        <td>${spCell}</td>
        <td>${spOddsStr}</td>
        <td>${totCell}</td>
        <td>${totOddsStr}</td>
        <td class="${resClass}">${resText}</td>
      </tr>`;
    }
    tbody.innerHTML = rhtml;

  } catch (err) {
    document.getElementById('loading').innerHTML = `<div style="color:var(--red)">Error: ${err.message}</div>`;
    console.error(err);
  }
}
function toggleCard(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? 'Hide Analysis' : 'Show Analysis';
}

main();
</script>
</body>
</html>
